<!DOCTYPE html>
	<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ToDo</title>
	</head>
	<body>
		<header class="header">
			<h1>My ToDo List</h1>
		</header>

		<aside class="sidebar">
			<h2>PROJECTS</h2>
			<nav>
				<ul>
					<li class="sidebar-item" tabindex="0">
						<span class="sidebar-icon"></span>
						<span class="sidebar-name">Default</span>
						<span class="sidebar-quantity">3</span>
					</li>
					<li class="sidebar-item" tabindex="0">
						<span class="sidebar-icon"></span>
						<span class="sidebar-name">Work</span>
						<span class="sidebar-quantity">5</span>
					</li>
					<li class="sidebar-item" tabindex="0">
						<span class="sidebar-icon"></span>
						<span class="sidebar-name">Personal</span>
						<span class="sidebar-quantity">2</span>
					</li>
				</ul>

				<button class="add-project-btn">+ New Project</button>
			</nav>
		</aside>

		<main>
			<div class="main-headline">
				<h2>Default</h2>
				<button class="btn add-task-btn">+ Add Task</button>
			</div>

			<form class="add-task-form">
					<input type="text" name="task-title" id="task-title" placeholder="Task title">

					<textarea 
						name="task-description" 
						id="task-description" 
						placeholder="Description (optional)"
					></textarea>

				<div class="input-row">
					<div class="input-cont">
						<label for="due-date">Due Date</label>
						<input type="date" name="due-date" id="due-date">
					</div>

					<div class="input-cont">
						<label for="priority">Priority</label>
						<select name="priority" id="priority">
							<option selected value="low">Low</option>
							<option value="medium">Medium</option>
							<option value="high">High</option>
						</select>
					</div>
				</div>

				<div class="form-buttons">
					<button type="submit" class="btn submit-btn">Add</button>
					<button class="btn cancel-btn">Cancel</button>
				</div>
			</form>

			<section class="tasks-container">
				<div class="task">
					<div class="task-left">
						<input type="checkbox">
						<div class="task-info">
							<p class="task-info-title">Buy Groceries</p>
							<p class="task-info-decsription">Milk, Eggs, Bread</p>
						</div>
					</div>

				<div class="task-right">
					<p class="task-date">2026-03-10</p>
					<p class="task-priority">Low</p>

						<button class="task-edit">&#9998;</button>
						<button class="task-delete">&times;</button>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
