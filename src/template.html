<!DOCTYPE html>
	<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ToDo</title>
	</head>
	<body>
		<header class="header">
			<h1>My ToDo List</h1>
		</header>

		<aside class="sidebar">
			<h2>PROJECTS</h2>
			<nav>
				<ul>
					
				</ul>

				<button class="add-project-btn">+ New Project</button>
			</nav>
		</aside>

		<dialog class="new-project-dialog">
			<form class="new-project-form" method="dialog">
				<h2>New Project</h2>
				<input type="text" name="project-name" id="project-name" placeholder="Project name" required>
				<div class="form-buttons">
					<button type="submit" class="btn submit-btn">Create</button>
					<button type="button" class="btn cancel-btn dialog-cancel-btn">Cancel</button>
				</div>
			</form>
		</dialog>

		<main>
			<div class="main-headline">
				<h2>Default</h2>
				<button class="btn add-task-btn">+ Add Task</button>
			</div>

			<form class="add-task-form hidden">
				<input type="text" name="task-title" id="task-title" placeholder="Task title">

				<textarea 
					name="task-description" 
					id="task-description" 
					placeholder="Description (optional)"
				></textarea>

				<div class="input-row">
					<div class="input-cont">
						<label for="due-date">Due Date</label>
						<input type="date" name="due-date" id="due-date">
					</div>

					<div class="input-cont">
						<label for="priority">Priority</label>
						<select name="priority" id="priority">
							<option selected value="low">Low</option>
							<option value="medium">Medium</option>
							<option value="high">High</option>
						</select>
					</div>

					<div class="input-cont">
						<label for="select-project">Project</label>
						<select name="project" id="select-project">

						</select>
					</div>
				</div>

				<div class="form-buttons">
					<button type="submit" class="btn submit-btn">Add</button>
					<button type="button" class="btn cancel-btn">Cancel</button>
				</div>
			</form>

			<section class="tasks-container">
				
			</section>

			<dialog id="dialog-task-edit">
				<form method="dialog" id="edit-form">
					<input type="text" name="task-edit-title" id="task-edit-title">
					<textarea name="task-edit-description" id="task-edit-description"></textarea>
					<input type="date" name="task-edit-due-date" id="task-edit-due-date">

					<select name="task-edit-priority" id="task-edit-priority">
						<option value="low">Low</option>
						<option value="Medium">Medium</option>
						<option value="High">High</option>
					</select>

				</form>
				
				<button class="submit-btn btn" form="edit-form">Submit</button>
				<button commandfor="dialog-task-edit" command="close" class="btn cancel-btn">Close</button>
			</dialog>
		</main>
	</body>
</html>
